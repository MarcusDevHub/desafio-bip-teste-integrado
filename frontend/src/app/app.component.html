<!-- HTML -->

<main class="main">
  <div class="content">
    <div class="container">
      <h1>Benefícios</h1>

      <p *ngIf="carregando">Carregando benefícios...</p>
      <p *ngIf="erro">{{ erro }}</p>

      <table *ngIf="beneficios.length > 0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Valor</th>
            <th>Ativo</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let beneficio of beneficios">
            <td>{{ beneficio.id }}</td>
            <td>{{ beneficio.nome }}</td>
            <td>{{ beneficio.descricao }}</td>
            <td>{{ beneficio.valor }}</td>
            <td>{{ beneficio.ativo ? 'Sim' : 'Não' }}</td>
          </tr>
        </tbody>
      </table>

      <p *ngIf="!carregando && beneficios.length === 0 && !erro">
        Nenhum benefício encontrado.
      </p>
    </div>
  </div>
</main>
